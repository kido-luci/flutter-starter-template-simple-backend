name: CI

on:
  push:
    branches: [main]
    # Docs-only changes don't affect the build; skip CI for them.
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Install the Go toolchain pinned by go.mod's `go` directive, so CI and
      # the repo never drift. Bump go.mod to upgrade. Module cache is restored
      # automatically.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      # Fail if the module graph or go.sum is not tidy.
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --quiet --exit-code -- go.mod go.sum; then
            echo "::error::go.mod/go.sum are not tidy. Run 'go mod tidy' and commit the result."
            git diff -- go.mod go.sum
            exit 1
          fi

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-clean. Run 'gofmt -w .':"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race detector + coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        if: always()
        run: go tool cover -func=coverage.out || true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore
